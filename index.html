<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notizbuch OS - Web Edition</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2ecc71">
  
  <style>
    :root {
      --bg-dark: #1e1e24;
      --panel-bg: #2c3e50;
      --btn-primary: #34495e;
      --btn-success: #2ecc71;
      --btn-warning: #f39c12;
      --btn-danger: #e74c3c;
      --text-main: #ffffff;
      --paper-bg: #fcfbe3;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* UNSTYLISH HIDDEN INPUT */
    #hidden-file-input { display: none; }

    /* LINKES PANEL: DATEIEN & BACKUP */
    #sidebar {
      width: 320px;
      background-color: var(--panel-bg);
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-shadow: 4px 0 15px rgba(0,0,0,0.3);
      z-index: 10;
    }

    .sidebar-title {
      text-align: center;
      color: #1abc9c;
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 5px;
      letter-spacing: 1px;
    }

    .scroll-controls {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .scroll-btn {
      background-color: var(--btn-primary);
      color: white;
      border: none;
      padding: 5px 15px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    #file-list {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow-y: auto;
      margin-bottom: 20px;
    }

    .file-item {
      background-color: var(--btn-primary);
      padding: 12px;
      text-align: center;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item.active {
      background-color: #e67e22;
      font-weight: bold;
    }

    .action-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      text-align: center;
      transition: opacity 0.2s;
    }

    .btn:hover { opacity: 0.9; }
    .btn-green { background-color: var(--btn-success); }
    .btn-orange { background-color: var(--btn-warning); }
    .btn-red { background-color: var(--btn-danger); }
    
    .horizontal-split {
      display: flex;
      gap: 10px;
    }
    .horizontal-split .btn { flex: 1; }

    .divider {
      height: 2px;
      background-color: #7f8c8d;
      margin: 10px 0;
    }

    /* RECHTES PANEL: DAS NOTIZBUCH */
    #main-content {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      padding: 40px;
      align-items: center;
      justify-content: center;
    }

    #notebook-container {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* DAS DIGITALE PAPIER */
    #paper {
      background-color: var(--paper-bg);
      color: #111;
      border-radius: 8px;
      padding: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 60vh;
    }

    .paper-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #ddd;
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    #current-file-title {
      font-size: 1.3rem;
      color: #e67e22;
      font-weight: bold;
    }

    #page-number {
      font-size: 1.1rem;
      color: #555;
    }

    /* DAS TEXTFELD (Echte Tastatur-Eingabe!) */
    #note-textarea {
      width: 100%;
      flex-grow: 1;
      background: transparent;
      border: none;
      resize: none;
      font-size: 1.2rem;
      line-height: 1.6;
      font-family: 'Courier New', Courier, monospace;
      color: #111;
      outline: none;
    }

    /* UNTERE NAVIGATION */
    .nav-controls {
      display: flex;
      justify-content: space-between;
      gap: 20px;
    }
    .nav-controls .btn {
      flex: 1;
    }
  </style>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); });
    }
  </script>
</head>
<body>

  <input type="file" id="hidden-file-input" accept=".json">

  <div id="sidebar">
    <div class="sidebar-title">DATEIEN</div>
    
    <div class="scroll-controls">
      <button class="scroll-btn" id="btn-file-up">▲</button>
      <button class="scroll-btn" id="btn-file-down">▼</button>
    </div>

    <div id="file-list"></div>

    <div class="action-group">
      <button class="btn btn-green" id="btn-new-file">+ Neue Datei</button>
      <div class="horizontal-split">
        <button class="btn btn-orange" id="btn-rename-file">Name</button>
        <button class="btn btn-red" id="btn-delete-file">Löschen</button>
      </div>
      <div class="divider"></div>
      <div class="horizontal-split">
        <button class="btn" style="background-color: #3498db;" id="btn-export">Backup</button>
        <button class="btn" style="background-color: #2980b9;" id="btn-import">Laden</button>
      </div>
    </div>
  </div>

  <div id="main-content">
    <div id="notebook-container">
      
      <div id="paper">
        <div class="paper-header">
          <div id="current-file-title">Datei: -</div>
          <div id="page-number">Seite: 1</div>
        </div>
        <textarea id="note-textarea" placeholder="Schreibe hier deine Notizen..."></textarea>
      </div>

      <div class="nav-controls">
        <button class="btn" style="background-color: var(--btn-primary);" id="btn-prev">Zurück</button>
        <button class="btn btn-red" id="btn-clear">Leeren</button>
        <button class="btn" style="background-color: var(--btn-primary);" id="btn-next">Weiter</button>
      </div>

    </div>
  </div>

  <script>
    let allFiles = JSON.parse(localStorage.getItem('webxr_multifiles')) || {
      "Willkommen": { 1: "Das ist dein Notizbuch im normalen Browser-Modus!\n\nDu kannst jetzt ganz normal mit deiner echten PC-Tastatur schreiben, Text kopieren oder am Handy tippen.\n\nAlles speichert sich weiterhin vollautomatisch ab!" }
    };
    
    let currentFileName = Object.keys(allFiles)[0] || "Willkommen";
    let currentPage = 1;
    let fileScrollIndex = 0;

    const textarea = document.getElementById('note-textarea');
    const pageNumField = document.getElementById('page-number');
    const fileTitleField = document.getElementById('current-file-title');
    const fileListContainer = document.getElementById('file-list');
    const fileInput = document.getElementById('hidden-file-input');

    function updateDisplay() {
      fileTitleField.innerText = 'Datei: ' + currentFileName;
      pageNumField.innerText = 'Seite: ' + currentPage;
      
      const currentFileData = allFiles[currentFileName] || {};
      textarea.value = currentFileData[currentPage] || "";
    }

    function renderFileList() {
      fileListContainer.innerHTML = "";
      const fileNames = Object.keys(allFiles);
      const visibleFiles = fileNames.slice(fileScrollIndex, fileScrollIndex + 5);
      
      visibleFiles.forEach((name) => {
        const item = document.createElement('div');
        item.className = 'file-item' + (name === currentFileName ? ' active' : '');
        item.innerText = name;
        
        item.addEventListener('click', () => {
          // Vorherige Seite sichern
          saveCurrentText();
          currentFileName = name;
          currentPage = 1;
          renderFileList();
          updateDisplay();
        });
        fileListContainer.appendChild(item);
      });
    }

    function saveCurrentText() {
      if (!allFiles[currentFileName]) allFiles[currentFileName] = {};
      allFiles[currentFileName][currentPage] = textarea.value;
      localStorage.setItem('webxr_multifiles', JSON.stringify(allFiles));
    }

    // Beim Tippen sofort automatisch speichern
    textarea.addEventListener('input', saveCurrentText);

    // SCROLLEN IN DER DATEILISTE
    document.getElementById('btn-file-up').addEventListener('click', () => {
      if (fileScrollIndex > 0) { fileScrollIndex--; renderFileList(); }
    });
    document.getElementById('btn-file-down').addEventListener('click', () => {
      if (fileScrollIndex < Object.keys(allFiles).length - 5) { fileScrollIndex++; renderFileList(); }
    });

    // SEITEN BLÄTTERN
    document.getElementById('btn-next').addEventListener('click', () => {
      saveCurrentText();
      currentPage++;
      updateDisplay();
    });

    document.getElementById('btn-prev').addEventListener('click', () => {
      if (currentPage > 1) {
        saveCurrentText();
        currentPage--;
        updateDisplay();
      }
    });

    document.getElementById('btn-clear').addEventListener('click', () => {
      if(confirm("Möchtest du diese Seite wirklich leeren?")) {
        textarea.value = "";
        saveCurrentText();
        updateDisplay();
      }
    });

    // NEUE DATEI
    document.getElementById('btn-new-file').addEventListener('click', () => {
      saveCurrentText();
      let name = prompt("Name für neue Datei:", "Notiz_" + (Object.keys(allFiles).length + 1));
      if (name && name.trim() !== "") {
        name = name.replace(/[^a-zA-Z0-9_]/g, "_");
        if (!allFiles[name]) {
          allFiles[name] = { 1: "" };
          currentFileName = name;
          currentPage = 1;
          localStorage.setItem('webxr_multifiles', JSON.stringify(allFiles));
          renderFileList();
          updateDisplay();
        }
      }
    });

    // UMBENENNEN
    document.getElementById('btn-rename-file').addEventListener('click', () => {
      let newName = prompt(`Neuer Name für '${currentFileName}':`, currentFileName);
      if (newName && newName.trim() !== "" && newName !== currentFileName) {
        newName = newName.replace(/[^a-zA-Z0-9_]/g, "_");
        allFiles[newName] = allFiles[currentFileName];
        delete allFiles[currentFileName];
        currentFileName = newName;
        localStorage.setItem('webxr_multifiles', JSON.stringify(allFiles));
        renderFileList();
        updateDisplay();
      }
    });

    // LÖSCHEN
    document.getElementById('btn-delete-file').addEventListener('click', () => {
      if(Object.keys(allFiles).length <= 1) {
        alert("Du musst mindestens eine Datei behalten!");
        return;
      }
      if(confirm(`Möchtest du '${currentFileName}' wirklich komplett löschen?`)) {
        delete allFiles[currentFileName];
        currentFileName = Object.keys(allFiles)[0];
        currentPage = 1;
        localStorage.setItem('webxr_multifiles', JSON.stringify(allFiles));
        renderFileList();
        updateDisplay();
      }
    });

    // BACKUP (Export)
    document.getElementById('btn-export').addEventListener('click', () => {
      saveCurrentText();
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(allFiles));
      const dl = document.createElement('a');
      dl.setAttribute("href", dataStr);
      dl.setAttribute("download", "notizbuch_backup.json");
      document.body.appendChild(dl);
      dl.click();
      dl.remove();
    });

    // BACKUP (Import)
    document.getElementById('btn-import').addEventListener('click', () => { fileInput.click(); });
    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const imported = JSON.parse(e.target.result);
          if (typeof imported === 'object' && imported !== null) {
            allFiles = imported;
            localStorage.setItem('webxr_multifiles', JSON.stringify(allFiles));
            currentFileName = Object.keys(allFiles)[0];
            currentPage = 1;
            renderFileList();
            updateDisplay();
            alert("Backup erfolgreich geladen!");
          }
        } catch (err) { alert("Fehler beim Laden des Backups."); }
      };
      reader.readAsText(file);
    });

    // Start-Aufruf
    renderFileList();
    updateDisplay();
  </script>
</body>
</html>
